<html lang="en-US">
<head>
    <!-- W:1280 H:768 -->
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="launcher.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayKOCraft</title>
    <script src="common.js" defer></script>
    <script src="i18n.js" defer></script>
    <script src="launcher.js" defer></script>
    <script src="config.js" defer></script>
</head>
<body>
    <div class="main">
        <!-- TITLE BAR -->
        <div class="titleBar" data-tauri-drag-region>
            <img class="titleBar-drag" data-tauri-drag-region src="assets/images/saykocraft-hd.png">

            <div class="windowControls">
                <svg onclick="onMinimize()" class="icon icon-minimize" aria-label="Minimize window" data-i18n-aria-label="minimizeWindow">
                    <use href="assets/icons/sprite.svg#minimize"></use>
                </svg>
                <svg onclick="onClose()" class="icon icon-close" aria-label="Close window" data-i18n-aria-label="closeWindow">
                    <use href="assets/icons/sprite.svg#xmark"></use>
                </svg>
            </div>
        </div>
        <div class="content">
            <div class="sideBar">
                <div class="serverlist">
                    <div style="background-image: var(--earth-logo);" class="server selected">
                        <span>SayKOCraft Earth</span>
                    </div>
                    <div style="background-image: var(--mystery-logo);" class="server unselectable">
                        <span data-i18n="server.comingSoon">Coming Soon</span>
                    </div>
                </div>

                <svg class="icon icon-settings" aria-label="Launcher settings" data-i18n-aria-label="launcherSettings">
                    <use href="assets/icons/sprite.svg#settings"></use>
                </svg>
                <div id="sayko-profileicon" class="account">
                    <span id="sayko-username">PLAYERNAME</span>
                </div>
            </div>

            <div class="centerDiv">
                <div class="centerpage centerpage-main is-active" data-page="MAIN" aria-hidden="false">
                    <img draggable="false" class="server-logo" src="assets/images/earth-text.png">
                
                    <div class="modpack-buttons">
                        <button id="modpack-actionbutton" onclick="actionButtonHandler()" class="button-action start">
                            <!--<svg class="icon icon-play" aria-label="Modpack action" data-i18n-aria-label="modpackAction">
                                <use href="assets/icons/sprite.svg#play"></use>
                            </svg>-->
                            <span id="modpack-actionbutton-label" class="button-label">...</span>
                        </button>

                        <button id="modpack-settingsbutton" class="button-pack-settings">
                            <svg class="icon icon-settings" aria-label="Modpack settings" data-i18n-aria-label="modpackSettings">
                                <use href="assets/icons/sprite.svg#settings"></use>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="centerpage centerpage-launchersettings" data-page="LAUNCHER_SETTINGS" aria-hidden="true">
                    <div class="settings-div">
                        <span class="settings-title" data-i18n="launcherSettingsTitle">Launcher Settings</span>
                        <div class="setting-div">
                            <span class="setting-title" data-i18n="installationDirectory">Installation Directory</span>
                            <input type="text" class="setting-textinput" data-config-key="install_dir" data-path-validate>
                        </div>
                        <div class="setting-div">
                            <span class="setting-title" data-i18n="dataDirectory">Asset Directory</span>
                            <input type="text" class="setting-textinput" data-config-key="data_dir" data-path-validate>
                        </div>
                        <div class="setting-div">
                            <span class="setting-title" data-i18n="keepLauncherOpen">Keep Launcher Open</span>
                            <label class="switch setting-checkbox">
                                <input type="checkbox" data-config-key="keep_launcher_open">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-div">
                            <span class="setting-title" data-i18n="language">Language</span>
                            <select name="language" data-config-key="language">
                                <option value="en-US" data-i18n="language.englishUS">English (US)</option>
                                <option value="tr-TR" data-i18n="language.turkish">Türkçe</option>
                            </select>
                        </div>
                        <div class="logout-div">
                            <div>
                                <button onclick="logout()" class="button-danger logout-button" data-i18n="logout">Logout</button>
                                <button onclick="openDevConsole()" class="devconsole-button" data-i18n="developerConsole">Developer Console</button>
                            </div>
                            <span id="sayko-launcherversion" class="version-text">saykocraft-launcher</span>
                        </div>
                    </div>
                </div>

                <div class="centerpage centerpage-modpacksettings" data-page="MODPACK_SETTINGS" aria-hidden="true">
                    <div class="settings-div">
                        <div class="settings-header">
                            <span id="modpacksettings-back" class="settings-title back">←</span>
                            <span class="settings-title" data-i18n="modpackSettingsTitle">Settings</span>
                            <span id="modpack-version" class="settings-title sub"></span>
                        </div>

                        <div class="setting-div">
                            <span class="setting-title" data-i18n="instanceLocation">Instance Location</span>
                            <div class="setting-inline">
                                <input id="modpack-location" type="text" class="setting-textinput" disabled>
                                <button class="setting-button" onclick="browseInstance(ACTIVE_INSTANCE_ID)" data-i18n="pathBrowse">Browse</button>
                                <span id="modpack-filesize" class="setting-installdir-filesize">Calculating...</span>
                            </div>
                            <div class="modpacksettings-actionbutton-div">
                                <button onclick="removeInstance()" class="modpacksettings-actionbutton button-danger" data-i18n="action.remove">Remove</button>
                                <button class="modpacksettings-actionbutton" data-i18n="action.changeVersion">Change Version</button>
                                <button onclick="ensureInstance()" class="modpacksettings-actionbutton" data-i18n="action.repair">Repair</button>
                            </div>
                        </div>

                        <div class="setting-div">
                            <span class="setting-title" data-i18n="maximumRam">Maximum RAM (MB)</span>
                            <input type="number" class="setting-textinput raminput" min="512" step="256" data-instance-config-key="maximum_ram_mb">
                        </div>

                        <div class="setting-div">
                            <span class="setting-title" data-i18n="additionalJvmArguments">Additional JVM Arguments</span>
                            <textarea class="setting-textarea" spellcheck="false" data-instance-config-key="additional_jvm_args"></textarea>
                        </div>
                    </div>
                </div>

                <div class="loading-bar" id="launcher-loadingbar">
                    <div id="launcher-progressbar" class="bar-progress"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
