<html lang="en">
<head>
    <!-- W:1280 H:768 -->
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="launcher.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayKOCraft</title>
    <script src="common.js" defer></script>
    <script src="launcher.js" defer></script>
    <script srC="config.js" defer></script>
</head>
<body>
    <div class="main">
        <!-- TITLE BAR -->
        <div class="titleBar" data-tauri-drag-region>
            <img class="titleBar-drag" data-tauri-drag-region src="assets/images/saykocraft-hd.png">

            <div class="windowControls">
                <svg onclick="onMinimize()" class="icon icon-minimize" aria-label="Minimize window">
                    <use href="assets/icons/sprite.svg#minimize"></use>
                </svg>
                <svg onclick="onClose()" class="icon icon-close" aria-label="Close window">
                    <use href="assets/icons/sprite.svg#xmark"></use>
                </svg>
            </div>
        </div>
        <div class="content">
            <div class="sideBar">
                <div class="serverlist">
                    <div style="background-image: var(--earth-logo);" class="server selected">
                        <span>SayKOCraft Earth</span>
                    </div>
                    <div style="background-image: var(--mystery-logo);" class="server unselectable">
                        <span>Coming Soon</span>
                    </div>
                </div>

                <svg class="icon icon-settings" aria-label="Launcher settings">
                    <use href="assets/icons/sprite.svg#settings"></use>
                </svg>
                <div id="sayko-profileicon" class="account">
                    <span id="sayko-username">PLAYERNAME</span>
                </div>
            </div>

            <div class="centerDiv">
                <div class="centerpage centerpage-main is-active" data-page="MAIN" aria-hidden="false">
                    <img draggable="false" class="server-logo" src="assets/images/earth-text.png">
                
                    <div class="modpack-buttons">
                        <button class="button-action start">
                            <svg class="icon icon-play" aria-label="Modpack action">
                                <use href="assets/icons/sprite.svg#play"></use>
                            </svg>
                            Start
                        </button>

                        <button class="button-pack-settings warning">
                            <svg class="icon icon-settings" aria-label="Modpack settings">
                                <use href="assets/icons/sprite.svg#settings"></use>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="centerpage centerpage-launchersettings" data-page="LAUNCHER_SETTINGS" aria-hidden="true">
                    <div class="settings-div">
                        <span class="settings-title">Launcher Settings</span>
                        <div class="setting-div">
                            <span class="setting-title">Installation Directory</span>
                            <input id="config-install_dir" type="text" class="setting-textinput">
                        </div>
                        <div class="setting-div">
                            <span class="setting-title">Keep Launcher Open</span>
                            <label class="switch setting-checkbox">
                                <input id="config-keep_launcher_open" type="checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-div">
                            <span class="setting-title">Language</span>
                            <select name="language" id="config-language">
                                <option value="en-US">English (US)</option>
                                <option value="tr-TR">Türkçe</option>
                            </select>
                        </div>
                        <div class="logout-div">
                            <button onclick="logout()" class="button-danger logout-button">Logout</button>
                            <span id="sayko-launcherversion" class="version-text">saykocraft-launcher</span>
                        </div>
                    </div>
                </div>

                <div class="loading-bar">
                    <div class="bar-progress"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
